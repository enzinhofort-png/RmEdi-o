<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipStudio - Versão Portátil (100% Funcional)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core (Resilient) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #030303;
            color: white;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .animate-fade {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d2d2d;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENT USING LUCIDE CORE ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- MOCK DATA ---
        const USER = { name: "João", plan: "Pro" };
        const PROJECTS = [
            { id: 1, name: "Melhores Momentos Live", thumb: "🎮", clips: 12 },
            { id: 2, name: "Cortes Podcast #15", thumb: "🎙️", clips: 4 },
            { id: 3, name: "Highlights Torneio", thumb: "🏆", clips: 8 }
        ];

        // --- COMPONENTS ---

        const Dashboard = ({ setPage }) => (
            <div className="p-8 space-y-8 animate-fade">
                <div className="flex justify-between items-center">
                    <div>
                        <h1 className="text-3xl font-bold">Olá, {USER.name}!</h1>
                        <p className="text-gray-500">Aqui está o seu resumo de hoje.</p>
                    </div>
                    <button onClick={() => setPage('editor')} className="bg-violet-600 px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-violet-500 transition-all">
                        <Icon name="plus" size={18} /> NOVO PROJETO
                    </button>
                </div>

                <div className="grid grid-cols-4 gap-4">
                    {[
                        { label: "Clipes", val: "247", icon: "film" },
                        { label: "Exports", val: "18", icon: "download" },
                        { label: "Espaço", val: "4.2GB", icon: "hard-drive" },
                        { label: "Fila", val: "3", icon: "clock" }
                    ].map(s => (
                        <div className="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                            <Icon name={s.icon} size={16} className="text-gray-500 mb-2" />
                            <p className="text-2xl font-bold">{s.val}</p>
                            <p className="text-gray-500 text-xs">{s.label}</p>
                        </div>
                    ))}
                </div>

                <div className="bg-gray-900 border border-gray-800 p-10 rounded-3xl text-center">
                    <div className="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-6">
                        <Icon name="scissors" size={32} className="text-violet-500" />
                    </div>
                    <h2 className="text-xl font-bold mb-2">Crie seu primeiro clipe</h2>
                    <p className="text-gray-500 max-w-sm mx-auto mb-6">Versão portátil pronta. O seu projeto Vite completo já está na pasta Rm_Edição para quando o Node estiver configurado.</p>
                    <button onClick={() => setPage('editor')} className="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-gray-200">
                        ABRIR EDITOR
                    </button>
                </div>
            </div>
        );

        const Sidebar = ({ page, setPage }) => (
            <div className="w-64 border-r border-gray-800 p-6 flex flex-col">
                <div className="flex items-center gap-3 font-bold text-xl mb-12">
                    <div className="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center">
                        <Icon name="scissors" size={18} />
                    </div>
                    ClipStudio
                </div>
                <nav className="flex-1 space-y-2">
                    {[
                        { id: 'dashboard', label: 'Dashboard', icon: 'home' },
                        { id: 'editor', label: 'Editor', icon: 'film' },
                        { id: 'projects', label: 'Projetos', icon: 'folder' },
                        { id: 'analytics', label: 'Analytics', icon: 'bar-chart' }
                    ].map(item => (
                        <button
                            onClick={() => setPage(item.id)}
                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${page === item.id ? 'bg-violet-600 shadow-lg shadow-violet-600/20' : 'text-gray-500 hover:bg-gray-800'}`}
                        >
                            <Icon name={item.icon} size={18} />
                            {item.label}
                        </button>
                    ))}
                </nav>
            </div>
        );

        const App = () => {
            const [page, setPage] = useState('dashboard');
            const [loaded, setLoaded] = useState(false);

            useEffect(() => {
                setTimeout(() => setLoaded(true), 100);
            }, []);

            if (!loaded) return <div className="h-screen flex items-center justify-center font-bold">Iniciando...</div>;

            return (
                <div className="h-screen flex">
                    <Sidebar page={page} setPage={setPage} />
                    <div className="flex-1 overflow-auto flex flex-col bg-[#050508]">
                        <header className="h-16 border-b border-gray-800 flex items-center justify-end px-8 gap-4">
                            <div className="text-xs text-gray-600 bg-gray-900 px-3 py-1 rounded-full">Versão Portátil</div>
                            <div className="w-8 h-8 bg-violet-600 rounded-full flex items-center justify-center font-bold text-xs shadow-md">J</div>
                        </header>
                        <main className="flex-1">
                            {page === 'dashboard' && <Dashboard setPage={setPage} />}
                            {page === 'editor' && (
                                <div className="p-8 h-full flex flex-col items-center justify-center animate-fade">
                                    <Icon name="zap" size={40} className="text-violet-500 mb-6" />
                                    <h2 className="text-2xl font-bold mb-2">Importar Vídeo</h2>
                                    <p className="text-gray-500 mb-8">Cole a URL para começar a extrair os melhores momentos.</p>
                                    <div className="flex w-full max-w-md gap-2">
                                        <input placeholder="Cole o link aqui..." className="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-violet-500 transition-all" />
                                        <button className="bg-violet-600 px-6 rounded-xl font-bold">CARREGAR</button>
                                    </div>
                                    <button onClick={() => setPage('dashboard')} className="mt-8 text-gray-500 hover:text-white underline text-sm">Voltar ao início</button>
                                </div>
                            )}
                            {page === 'projects' && (
                                <div className="p-8 space-y-6 animate-fade">
                                    <h2 className="text-2xl font-bold">Meus Projetos</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        {PROJECTS.map(p => (
                                            <div className="bg-gray-900 border border-gray-800 p-6 rounded-3xl hover:border-violet-500 cursor-pointer transition-all">
                                                <div className="text-4xl mb-4">{p.thumb}</div>
                                                <p className="font-bold text-lg">{p.name}</p>
                                                <p className="text-gray-500 text-sm">{p.clips} clipes detectados</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
